<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOZZDEX V2.1 | Royal Gold</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            color: white;
            font-family: 'Inter', sans-serif;
        }
        .gold-glow {
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            border: 1px solid #d4af37;
        }
        .btn-gold {
            background: linear-gradient(135deg, #d4af37 0%, #f9e076 100%);
            color: black;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4); }
        .btn-connect { background-color: #8b0000; border: 1px solid #d4af37; }
        .wallet-active { background-color: #4b3d00; border: 1px solid #f9e076; }
        input { background: rgba(255, 255, 255, 0.05); border: 1px solid #333; outline: none; color: #f9e076; }
        input:focus { border-color: #d4af37; }
    </style>
</head>
<body class="min-h-screen">
    <nav class="flex justify-between items-center p-6 border-b border-gray-800">
        <div class="text-2xl font-bold italic">
            <span class="text-white">BOZZ</span><span class="text-[#d4af37]">DEX</span>
        </div>
        <button id="connectBtn" class="btn-connect px-6 py-2 rounded-full text-white text-sm font-bold gold-glow">
            CONNECT WALLET
        </button>
    </nav>

    <main class="flex flex-col items-center justify-center mt-10 px-4">
        <div class="gold-glow w-full max-w-md p-6 rounded-3xl bg-black/80 backdrop-blur-md">
            <h2 class="text-lg font-semibold mb-4 text-[#d4af37]">Swap Tokens</h2>

            <div class="bg-gray-900/50 p-4 rounded-2xl mb-2 border border-gray-800">
                <div class="flex justify-between items-center">
                    <input type="number" id="amtIn" placeholder="0.0" class="w-2/3 bg-transparent text-2xl font-medium">
                    <span class="text-sm font-bold text-gray-300">TOKEN A</span>
                </div>
            </div>

            <div class="flex justify-center -my-4 relative z-10">
                <div class="bg-black p-2 rounded-xl border border-[#d4af37] text-[#d4af37]">↓</div>
            </div>

            <div class="bg-gray-900/50 p-4 rounded-2xl mt-2 border border-gray-800">
                <div class="flex justify-between items-center">
                    <input type="number" id="amtOut" placeholder="0.0" class="w-2/3 bg-transparent text-2xl font-medium" readonly>
                    <span class="text-sm font-bold text-[#d4af37]">wOPN</span>
                </div>
            </div>

            <button id="swapBtn" class="btn-gold w-full py-4 rounded-2xl mt-6 uppercase tracking-widest">
                ENTER AMOUNT
            </button>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
