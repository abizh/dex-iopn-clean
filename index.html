<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOZZDEX | Sovereign Sentinel v46.0</title>
    
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>

    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --primary: #00ff88;
            --accent: #58a6ff;
            --danger: #ff4444;
            --text: #c9d1d9;
            --border: #30363d;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 10px;
            font-size: 14px;
        }

        /* --- UI COMPONENTS --- */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
        }

        .header-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .status-pill {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: bold;
            background: #21262d;
            border: 1px solid var(--border);
        }

        .status-online { color: var(--primary); border-color: var(--primary); }

        /* --- INPUTS --- */
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 11px; color: #8b949e; margin-bottom: 5px; }
        
        input {
            width: 100%;
            background: #0d1117;
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            font-family: 'Courier New', monospace;
        }

        input:focus { outline: none; border-color: var(--accent); }

        /* --- BUTTONS --- */
        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
            margin-top: 5px;
        }

        .btn-connect { background: var(--accent); color: white; margin-bottom: 15px; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); margin-top: 10px; }
        
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn:active { transform: scale(0.98); }

        /* --- FORENSIC TERMINAL --- */
        #statusLog {
            font-family: 'Consolas', monospace;
            font-size: 11px;
            color: var(--primary);
            margin-top: 10px;
            min-height: 18px;
        }

        .history-box {
            margin-top: 20px;
            border-top: 1px solid var(--border);
            padding-top: 15px;
        }

        #txList { max-height: 200px; overflow-y: auto; }

        .tab-nav { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { 
            flex: 1; padding: 8px; background: #21262d; border: 1px solid var(--border); 
            color: #8b949e; border-radius: 6px; font-size: 11px; cursor: pointer;
        }
        .tab-btn.active { background: var(--border); color: #fff; border-color: var(--accent); }
    </style>
</head>
<body>

    <div class="header-box">
        <div style="font-weight: 800; font-size: 18px; color: var(--primary);">BOZZDEX <span style="font-size: 10px; color: #555;">v46.0</span></div>
        <div id="kernel-status" class="status-pill">SENTINEL IDLE</div>
    </div>

    <button id="btnConnect" class="btn btn-connect">CONNECT WALLET</button>

    <div class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('swap')">SWAP</button>
        <button class="tab-btn" onclick="switchTab('liquidity')">LIQUIDITY</button>
    </div>

    <div id="tab-swap" class="card">
        <div class="input-group">
            <label id="balIn">Saldo: 0.00</label>
            <input type="number" id="inputAmount" placeholder="0.0">
        </div>
        <div style="text-align: center; color: var(--accent); margin-bottom: 10px;">⬇</div>
        <div class="input-group">
            <label id="balOut">Saldo: 0.00</label>
            <input type="number" id="outputAmount" placeholder="Output estimasi" readonly>
        </div>
        <div id="statusLog">Silahkan koneksi wallet bray...</div>
        <button id="btnSwap" class="btn btn-primary" disabled>EXECUTE SWAP</button>
    </div>

    <div id="tab-liquidity" class="card" style="display: none;">
        <div class="input-group">
            <label>Token A (WOPN)</label>
            <input type="number" id="inputAmtA" placeholder="0.0">
        </div>
        <div class="input-group">
            <label>Token B (OPNT)</label>
            <input type="number" id="inputAmtB" placeholder="0.0">
        </div>
        <button id="btnLiquidity" class="btn btn-primary" disabled>ADD LIQUIDITY</button>
        
        <div style="margin-top: 15px; border-top: 1px solid var(--border); padding-top: 10px;">
            <label>REMOVE LIQUIDITY</label>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                <button class="btn btn-outline" onclick="onRemoveLiq(1)" disabled>25%</button>
                <button class="btn btn-outline" onclick="onRemoveLiq(2)" disabled>50%</button>
                <button class="btn btn-outline" onclick="onRemoveLiq(3)" disabled>75%</button>
                <button class="btn btn-outline" onclick="onRemoveLiq(4)" disabled>100%</button>
            </div>
        </div>
    </div>

    <div class="history-box">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <label>TRANSACTION HISTORY (v46 Ledger)</label>
            <span onclick="clearHistory()" style="font-size: 10px; color: var(--danger); cursor: pointer;">CLEAR</span>
        </div>
        <div id="txList"></div>
    </div>

    <script src="app.js"></script>
    <script>
        // --- UI TAB SYSTEM ---
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('tab-swap').style.display = tab === 'swap' ? 'block' : 'none';
            document.getElementById('tab-liquidity').style.display = tab === 'liquidity' ? 'block' : 'none';
        }

        // --- WALLET CONNECT BRIDGE ---
        async function connect() {
            if (!window.ethereum) return alert("Install Metamask/Rabby bray!");
            try {
                const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
                const userAddress = accounts[0];
                document.getElementById("btnConnect").innerText = userAddress.slice(0, 6) + "..." + userAddress.slice(-4);
                document.querySelectorAll('button').forEach(b => b.disabled = false);
                document.getElementById("statusLog").innerText = "Wallet Connected ✅";
                if (window.updateBalances) window.updateBalances();
            } catch (err) { 
                document.getElementById("statusLog").innerText = "Koneksi Gagal bray!";
            }
        }

        // --- ACTION HANDLERS (Calling Unified Kernel) ---
        
        async function onSwapClick() {
            const val = document.getElementById("inputAmount").value;
            const outputVal = document.getElementById("outputAmount").value;
            if (!val || val <= 0) return;

            const amtIn = ethers.parseUnits(val, 18);
            const minOut = (ethers.parseUnits(outputVal, 18) * 97n) / 100n; // 3% Slippage

            setKernelStatus(true);
            await window.executeKernelAction("SWAP", { amtIn, minOut });
            setKernelStatus(false);
        }

        async function onAddLiquidityClick() {
            const amtA = ethers.parseUnits(document.getElementById("inputAmtA").value, 18);
            const amtB = ethers.parseUnits(document.getElementById("inputAmtB").value, 18);
            
            setKernelStatus(true);
            await window.executeKernelAction("ADD_LIQUIDITY", { amtA, amtB });
            setKernelStatus(false);
        }

        async function onRemoveLiq(percent) {
            setKernelStatus(true);
            await window.executeKernelAction("REMOVE_LIQUIDITY", { percent });
            setKernelStatus(false);
        }

        function setKernelStatus(isLive) {
            const el = document.getElementById("kernel-status");
            el.innerText = isLive ? "SENTINEL LIVE" : "SENTINEL IDLE";
            el.className = isLive ? "status-pill status-online" : "status-pill";
        }

        function clearHistory() {
            if(confirm("Hapus history ledger?")) {
                localStorage.removeItem("bozz_history");
                window.renderHistory();
            }
        }

        // Event Listeners
        document.getElementById("btnConnect").onclick = connect;
        document.getElementById("btnSwap").onclick = onSwapClick;
        document.getElementById("btnLiquidity").onclick = onAddLiquidityClick;

        // Auto-refresh balances logic can be added here
    </script>
</body>
                    </html>
