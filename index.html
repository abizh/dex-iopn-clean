<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sovereign Sentinel v46.0 | Command Center</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
    <style>
        :root {
            --bg: #0a0a0c;
            --surface: #16161a;
            --primary: #00ff88;
            --warning: #ffcc00;
            --danger: #ff4444;
            --text: #e0e0e0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 15px;
            font-size: 14px;
            line-height: 1.5;
        }

        /* --- LEDGER STATUS CARD --- */
        .status-card {
            background: var(--surface);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .badge-live { background: var(--primary); color: #000; }
        .badge-dead { background: #444; color: #ccc; }

        /* --- ACTION BUTTONS --- */
        .btn-action {
            display: block;
            width: 100%;
            background: var(--primary);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        .btn-action:active { transform: scale(0.98); }
        .btn-action:disabled { opacity: 0.3; cursor: not-allowed; }

        /* --- FORENSIC LOGS (The Heart) --- */
        #log-container {
            background: #000;
            border: 1px solid #444;
            border-radius: 6px;
            height: 200px;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            padding: 10px;
            font-size: 12px;
            color: #00ff44;
        }

        .log-entry { margin-bottom: 4px; border-left: 2px solid #333; padding-left: 8px; }
        .log-error { color: var(--danger); }
        .log-warn { color: var(--warning); }
        .log-success { color: var(--primary); }

        .meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
            font-size: 12px;
        }

        .meta-item {
            background: rgba(255,255,255,0.05);
            padding: 8px;
            border-radius: 4px;
        }

        .label { color: #888; display: block; margin-bottom: 2px; }
    </style>
</head>
<body>

    <div class="status-card">
        <div class="status-header">
            <strong>SENTINEL KERNEL v46.0</strong>
            <span id="runtime-status" class="badge badge-dead">Idle</span>
        </div>
        
        <div class="meta-grid">
            <div class="meta-item">
                <span class="label">CURRENT EPOCH</span>
                <span id="display-epoch">NONE</span>
            </div>
            <div class="meta-item">
                <span class="label">LEASE OWNER</span>
                <span id="display-lease">VACANT</span>
            </div>
            <div class="meta-item">
                <span class="label">PENDING NONCE</span>
                <span id="display-nonce">---</span>
            </div>
            <div class="meta-item">
                <span class="label">LEDGER PAGES</span>
                <span id="display-pages">0</span>
            </div>
        </div>

        <button id="btn-remove-liq" class="btn-action" onclick="handleRemoveLiquidity()">
            EXECUTE REMOVE LIQUIDITY
        </button>
    </div>

    <div style="margin-bottom: 5px; font-weight: bold; font-size: 12px; color: #888;">
        LIVE FORENSIC REPLAY ENGINE:
    </div>
    <div id="log-container">
        <div class="log-entry">> Sentinel initialised. Waiting for intent...</div>
    </div>

    <script src="app.js"></script>

    <script>
        // UI BRIDGE: Menghubungkan visual dengan internal app.js
        const logContainer = document.getElementById('log-container');
        
        // Custom Logger untuk Forensic View
        window.forensicUI = {
            log: (msg, type = '') => {
                const div = document.createElement('div');
                div.className = `log-entry ${type ? 'log-'+type : ''}`;
                const time = new Date().toLocaleTimeString();
                div.innerHTML = `<span style="color:#666">[${time}]</span> ${msg}`;
                logContainer.prepend(div);
            },
            updateMetadata: (data) => {
                if (data.epoch) document.getElementById('display-epoch').innerText = data.epoch.substring(0, 15) + '...';
                if (data.lease) document.getElementById('display-lease').innerText = data.lease.substring(0, 8);
                if (data.status) {
                    const el = document.getElementById('runtime-status');
                    el.innerText = data.status;
                    el.className = `badge badge-${data.status === 'LIVE' ? 'live' : 'dead'}`;
                }
                if (data.pages) document.getElementById('display-pages').innerText = data.pages;
                if (data.nonce) document.getElementById('display-nonce').innerText = data.nonce;
            }
        };

        // Handler tombol yang aman
        async function handleRemoveLiquidity() {
            const btn = document.getElementById('btn-remove-liq');
            btn.disabled = true;
            
            try {
                // Panggil kernel app.js
                await window.executeRemoveLiquidity(0); 
            } catch (e) {
                window.forensicUI.log("UI_CRITICAL_FAULT: " + e.message, 'error');
            } finally {
                btn.disabled = false;
            }
        }

        // Auto-refresh metadata untuk observasi lease & ledger
        setInterval(() => {
            const lock = JSON.parse(localStorage.getItem('bozz_global_lock') || '{}');
            window.forensicUI.updateMetadata({
                lease: lock.token || 'VACANT',
                status: lock.token ? 'LIVE' : 'IDLE'
            });
        }, 1000);
    </script>
</body>
                </html>
