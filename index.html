<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGN KERNEL v71.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --border: #262626;
            --primary: #00ff88;
            --text: #e5e5e5;
            --dim: #737373;
            --error: #ff4444;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* HEADER & STATUS BAR */
        header {
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface);
        }

        .status-pill {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            border: 1px solid var(--border);
        }

        .online { color: var(--primary); border-color: var(--primary); }
        .offline { color: var(--error); border-color: var(--error); }

        /* MAIN LAYOUT */
        main {
            display: grid;
            grid-template-columns: 350px 1fr;
            flex: 1;
            overflow: hidden;
        }

        /* SIDEBAR: VAULT & ACTIONS */
        .sidebar {
            padding: 2rem;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .card {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .balance-label { font-size: 12px; color: var(--dim); margin-bottom: 4px; }
        .balance-value { font-size: 24px; font-weight: 600; margin-bottom: 1rem; }

        input {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid var(--border);
            color: #fff;
            border-radius: 4px;
            margin-bottom: 1rem;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:disabled { opacity: 0.3; cursor: not-allowed; }

        /* CONTENT: KERNEL MONITOR */
        .monitor {
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .tx-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid var(--border);
            font-family: 'Cascadia Code', monospace;
            font-size: 13px;
        }

        .hash-link { color: var(--primary); text-decoration: none; font-size: 11px; }
        .tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #333; }

        .signing-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>

    <div id="signingOverlay" class="signing-overlay">
        <div class="card" style="text-align: center;">
            <div style="margin-bottom: 1rem;">⚡ KERNEL AWAITING SIGNATURE</div>
            <div style="font-size: 12px; color: var(--dim);">Please check your wallet provider...</div>
        </div>
    </div>

    <header>
        <div>
            <span style="font-weight: bold; letter-spacing: 2px;">SOVEREIGN // v71.0</span>
        </div>
        <div id="networkStatus" class="status-pill offline">Disconnected</div>
    </header>

    <main>
        <section class="sidebar">
            <div class="card">
                <div class="balance-label">WALLET ADDRESS</div>
                <div id="addrDisplay" style="font-size: 11px; color: var(--primary); word-break: break-all;">Not Connected</div>
            </div>

            <div class="card">
                <div class="balance-label">ETH BALANCE (Native)</div>
                <div id="ethBalance" class="balance-value">0.00</div>
                
                <div class="balance-label">WOPN BALANCE (Wrapped)</div>
                <div id="wopnBalance" class="balance-value">0.00</div>
            </div>

            <div class="card">
                <input type="number" id="txAmount" placeholder="0.00" step="0.01">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <button id="btnDeposit" onclick="handleTx('DEPOSIT')">DEPOSIT</button>
                    <button id="btnWithdraw" onclick="handleTx('WITHDRAW')" style="background: transparent; color: var(--primary); border: 1px solid var(--primary);">WITHDRAW</button>
                </div>
            </div>
        </section>

        <section class="monitor">
            <div style="font-size: 14px; font-weight: bold; border-left: 3px solid var(--primary); padding-left: 10px;">
                TRANSACTION KERNEL JOURNAL
            </div>
            <div id="txJournal" class="card" style="min-height: 300px; padding: 0;">
                </div>
        </section>
    </main>

    <script>
        /**
         * UI SYNC ADAPTER
         * Menghubungkan Kernel v71.0 ke DOM
         */
        window.syncSovereignUI = (state) => {
            const { vault, kernel, network } = state;

            // 1. Update Network Status
            const netPill = document.getElementById('networkStatus');
            netPill.innerText = network.rpcStatus === 'OK' ? `CHAIN ${network.chainId}` : network.rpcStatus;
            netPill.className = `status-pill ${network.connected ? 'online' : 'offline'}`;

            // 2. Update Vault
            document.getElementById('addrDisplay').innerText = vault.address || "Not Connected";
            document.getElementById('ethBalance').innerText = parseFloat(vault.balanceIn).toFixed(4);
            document.getElementById('wopnBalance').innerText = parseFloat(vault.balanceOut).toFixed(4);

            // 3. Update Kernel UI State
            const isBusy = kernel.status !== 'IDLE';
            document.getElementById('btnDeposit').disabled = isBusy;
            document.getElementById('btnWithdraw').disabled = isBusy;
            document.getElementById('txAmount').disabled = isBusy;
            
            document.getElementById('signingOverlay').style.display = kernel.status === 'SIGNING' ? 'flex' : 'none';

            // 4. Render Journal
            const journal = document.getElementById('txJournal');
            journal.innerHTML = kernel.txQueue.length ? '' : '<div style="padding: 2rem; color: #444; text-align: center;">No transactions found in journal.</div>';
            
            kernel.txQueue.forEach(tx => {
                const item = document.createElement('div');
                item.className = 'tx-item';
                const statusColor = tx.status === 'SUCCESS' ? 'var(--primary)' : (tx.status === 'FAILED' ? 'var(--error)' : '#ffaa00');
                
                item.innerHTML = `
                    <div>
                        <span class="tag">${tx.type}</span>
                        <span style="color: ${statusColor}; margin-left: 8px;">● ${tx.status}</span>
                        <br/>
                        ${tx.hash ? `<a href="https://testnet.iopn.tech/tx/${tx.hash}" target="_blank" class="hash-link">${tx.hash.substring(0, 16)}...</a>` : `<span style="font-size: 10px; color: var(--dim);">${tx.error || 'No hash'}</span>`}
                    </div>
                    <div style="color: var(--dim); font-size: 10px;">${new Date(tx.ts).toLocaleTimeString()}</div>
                `;
                journal.appendChild(item);
            });
        };

        /**
         * ACTION HANDLER
         */
        function handleTx(mode) {
            const amount = document.getElementById('txAmount').value;
            if(!window.KernelDispatcher) return alert("Kernel not loaded!");
            
            window.KernelDispatcher.execute('WOPN_ACTION', {
                mode: mode,
                amount: amount
            });
        }
    </script>

    </body>
</html>
