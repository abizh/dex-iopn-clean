<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEX OPTIMIZER - PHASE 1 FINAL</title>
  <style>
    body { background:#0b0f14; color:white; font-family:sans-serif; padding:20px; }
    h2 { color:#00d4ff; border-bottom: 1px solid #333; padding-bottom:10px; text-transform: uppercase; letter-spacing: 1px; }
    .btn-connect { background:#ffffff; color:#000; padding:12px 20px; cursor:pointer; border:none; border-radius:10px; font-weight:bold; width: 100%; max-width:250px; margin-bottom:10px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
    .card { background: #161b22; border: 1px solid #30363d; padding: 15px; border-radius: 12px; text-align: center; border-left: 4px solid #3b82f6; }
    .card small { font-size: 10px; color: #888; display: block; margin-bottom: 5px; }
    .card .val { font-size: 16px; font-weight: bold; color: #00ff00; }
    .card .sym { font-size: 11px; color: #00d4ff; }
    .status-box { background:#161b22; border:1px solid #30363d; padding:15px; border-radius:8px; margin-top:10px; font-family:monospace; font-size:12px; }
    input { background:#1a1f26; border:1px solid #444; color:white; padding:10px; border-radius:5px; width:80px; }
  </style>
</head>
<body>

  <h2>DEX OPTIMIZER (LOCKED)</h2>

  <button id="btnConnect" class="btn-connect" onclick="connectWallet()">CONNECT WALLET</button>
  <div id="wallet" style="color:#555; font-size:11px; margin-bottom:20px;">Status: Disconnected</div>

  <div id="balance-grid" class="grid"></div>

  <div class="status-box">
    <label>Amount In:</label> 
    <input id="amountIn" type="number" value="10">
    <div style="margin-top:15px; display:flex; gap:10px;">
        <button onclick="simulateExecution()" style="flex:1; padding:10px; background:#28a745; color:white; border:none; border-radius:5px; cursor:pointer;">SIMULATE</button>
        <button onclick="executeSwap()" style="flex:1; padding:10px; background:#3b82f6; color:white; border:none; border-radius:5px; cursor:pointer;">EXECUTE</button>
    </div>
    <div id="output" style="margin-top:15px; color:#abb2bf; border-top:1px solid #333; padding-top:10px;">Ready for sync...</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <script src="app.js"></script>
  
  <script>
    async function connectWallet() {
      if (typeof window.ethereum !== 'undefined') {
        try {
          const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
          window.userAddress = accounts[0];
          window.provider = new ethers.providers.Web3Provider(window.ethereum);
          
          document.getElementById('wallet').innerText = "Linked: " + window.userAddress;
          document.getElementById('btnConnect').innerText = "WALLET LIVE ✅";
          document.getElementById('btnConnect').style.background = "#28a745";
          document.getElementById('btnConnect').style.color = "#fff";

          // Trigger Fungsi di app.js
          if (window.fetchBalances) window.fetchBalances();
          if (window.setupEventListeners) window.setupEventListeners();

          document.getElementById('output').innerText = "System: Blockchain Listener Active.";
        } catch (err) {
          document.getElementById('output').innerText = "Err: " + err.message;
        }
      } else { alert("Please use MetaMask/Mises Browser!"); }
    }
  </script>
</body>
</html>
