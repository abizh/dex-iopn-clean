<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOLD OPTIMIZER - PRECISION BUILD</title>

  <style>
    :root {
      --gold-grad: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
      --dark-bg: #05070a;
      --card-bg: #10141b;
    }

    body {
      background: var(--dark-bg);
      color: #e0e0e0;
      font-family: system-ui;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .header {
      width: 100%;
      max-width: 450px;
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    h2 {
      font-size: 14px;
      background: var(--gold-grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .btn-connect {
      background: var(--gold-grad);
      border: none;
      padding: 10px;
      border-radius: 20px;
      font-weight: bold;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2,1fr);
      gap: 10px;
      width: 100%;
      max-width: 450px;
      margin-bottom: 20px;
    }

    .card {
      background: var(--card-bg);
      padding: 12px;
      border-radius: 12px;
      border-left: 3px solid gold;
    }

    .swap-container {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 20px;
      width: 100%;
      max-width: 400px;
    }

    .input-group {
      margin-bottom: 10px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      background: black;
      color: white;
      border: 1px solid #333;
      border-radius: 10px;
    }

    .btn-swap {
      width: 100%;
      padding: 15px;
      margin-top: 15px;
      background: var(--gold-grad);
      border: none;
      border-radius: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    .output-log {
      margin-top: 20px;
      background: black;
      padding: 12px;
      border-radius: 10px;
      font-family: monospace;
      font-size: 12px;
      color: gold;
      max-width: 420px;
      width: 100%;
    }
  </style>
</head>

<body>

  <div class="header">
    <h2>Gold Optimizer</h2>
    <button id="btnConnect" class="btn-connect" onclick="connectWallet()">
      CONNECT
    </button>
  </div>

  <div id="balance-grid" class="grid"></div>

  <div class="swap-container">

    <div class="input-group">
      <label>You Sell</label>
      <input id="amountIn" type="number" value="1">
      <select id="tokenIn">
        <option value="tUSDT">tUSDT</option>
        <option value="WOPN">WOPN</option>
        <option value="OPN">OPN</option>
      </select>
    </div>

    <div class="input-group">
      <label>You Get (Est)</label>
      <input id="amountOut" readonly>
      <select id="tokenOut">
        <option value="TETE">TETE</option>
        <option value="tBNB">tBNB</option>
        <option value="OPNT">OPNT</option>
      </select>
    </div>

    <button id="btnSwap" class="btn-swap" onclick="executeSwap()" disabled>
      INITIATE SWAP
    </button>

  </div>

  <div id="output" class="output-log">
    > SYSTEM: Offline. Press Connect.
  </div>

  <!-- LIB -->
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <script src="app.js"></script>

  <!-- WALLET ENGINE -->
  <script>
    async function connectWallet() {
      if (!window.ethereum) {
        alert("Gunakan MetaMask Browser");
        return;
      }

      try {
        const accounts = await window.ethereum.request({
          method: "eth_requestAccounts"
        });

        window.wallet = {
          provider: new ethers.providers.Web3Provider(window.ethereum),
          signer: null,
          address: accounts[0]
        };

        window.wallet.signer = window.wallet.provider.getSigner();

        document.getElementById("btnConnect").innerText =
          accounts[0].slice(0,6) + "..." + accounts[0].slice(-4);

        document.getElementById("btnSwap").disabled = false;

        if (window.initEngine) initEngine();

      } catch (err) {
        document.getElementById("output").innerText =
          "> CONNECT ERROR: " + err.message;
      }
    }

    // AUTO DETECT WALLET (NO LOOP BUG)
    window.addEventListener("load", async () => {
      if (!window.ethereum) return;

      const accounts = await window.ethereum.request({
        method: "eth_accounts"
      });

      if (accounts.length > 0) {
        window.wallet = {
          provider: new ethers.providers.Web3Provider(window.ethereum),
          signer: null,
          address: accounts[0]
        };

        window.wallet.signer = window.wallet.provider.getSigner();

        document.getElementById("btnConnect").innerText =
          accounts[0].slice(0,6) + "..." + accounts[0].slice(-4);

        document.getElementById("btnSwap").disabled = false;

        if (window.initEngine) initEngine();
      }
    });
  </script>

</body>
</html>
