<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOZZDEX V3.5 FINAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.12.1/ethers.umd.min.js"></script>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9; --accent: #238636; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .dex-card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 16px; width: 90%; max-width: 360px; }
        .input-box { background: var(--bg); padding: 12px; border-radius: 12px; border: 1px solid var(--border); margin: 10px 0; }
        .input-box input { background: transparent; border: none; color: #fff; font-size: 18px; width: 100%; outline: none; }
        .btn-connect { width: 100%; padding: 10px; border-radius: 10px; background: #21262d; color: #fff; border: 1px solid var(--border); cursor: pointer; margin-bottom: 10px; }
        .btn-swap { width: 100%; padding: 14px; border-radius: 10px; background: var(--accent); color: #fff; border: none; font-weight: bold; cursor: pointer; }
        .btn-swap:disabled { background: #21262d; color: #484f58; }
        .label-row { display: flex; justify-content: space-between; font-size: 11px; color: #8b949e; margin-bottom: 4px; }
    </style>
</head>
<body>
    <div class="dex-card">
        <button id="btnConnect" class="btn-connect">Hubungkan Dompet</button>
        <div class="input-box">
            <div class="label-row"><span>JUAL (WOPN)</span><span id="balIn">Saldo: 0.0</span></div>
            <input type="text" id="inputAmount" inputmode="decimal" placeholder="0.0">
        </div>
        <div style="text-align:center; color:#58a6ff;">↓</div>
        <div class="input-box">
            <div class="label-row"><span>TERIMA (OPNT)</span><span id="balOut">Saldo: 0.0</span></div>
            <input type="text" id="outputAmount" placeholder="0.0" readonly>
        </div>
        <button id="btnSwap" class="btn-swap" disabled>SWAP SEKARANG</button>
        <div id="statusLog" style="font-size:10px; margin-top:10px; color:#7ee787;"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
