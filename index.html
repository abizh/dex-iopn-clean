<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOZZDEX | Unified Sentinel v46.0</title>
    
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>

    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --primary: #00ff88;
            --accent: #58a6ff;
            --danger: #ff4444;
            --text: #c9d1d9;
            --border: #30363d;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 10px;
            font-size: 14px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
        }

        .header-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .status-pill {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: bold;
            background: #21262d;
            border: 1px solid var(--border);
        }

        .status-online { color: var(--primary); border-color: var(--primary); box-shadow: 0 0 8px rgba(0,255,136,0.2); }

        .input-group { margin-bottom: 12px; }
        label { display: flex; justify-content: space-between; font-size: 11px; color: #8b949e; margin-bottom: 5px; }
        
        input {
            width: 100%;
            background: #0d1117;
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            font-family: 'Courier New', monospace;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
            margin-top: 5px;
        }

        .btn-connect { background: var(--accent); color: white; margin-bottom: 15px; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); margin-top: 10px; font-size: 12px; }
        
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        #statusLog {
            font-family: 'Consolas', monospace;
            font-size: 11px;
            color: var(--primary);
            margin-top: 10px;
            min-height: 18px;
            text-align: center;
        }

        .history-box {
            margin-top: 20px;
            border-top: 1px solid var(--border);
            padding-top: 15px;
        }

        #txList { max-height: 250px; overflow-y: auto; }

        .tab-nav { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { 
            flex: 1; padding: 10px; background: #21262d; border: 1px solid var(--border); 
            color: #8b949e; border-radius: 8px; font-size: 12px; cursor: pointer;
        }
        .tab-btn.active { background: var(--border); color: #fff; border-color: var(--accent); }
    </style>
</head>
<body>

    <div class="header-box">
        <div style="font-weight: 800; font-size: 18px; color: var(--primary);">BOZZDEX <span style="font-size: 10px; color: #555;">v46.0</span></div>
        <div id="kernel-status" class="status-pill">SENTINEL IDLE</div>
    </div>

    <button id="btnConnect" class="btn btn-connect">CONNECT WALLET</button>

    <div class="tab-nav">
        <button id="tabSwapBtn" class="tab-btn active" onclick="switchTab('swap')">SWAP</button>
        <button id="tabLiqBtn" class="tab-btn" onclick="switchTab('liquidity')">LIQUIDITY</button>
    </div>

    <div id="tab-swap" class="card">
        <div class="input-group">
            <label><span>Dari: WOPN</span> <span id="balIn">Saldo: 0.00</span></label>
            <input type="number" id="inputAmount" placeholder="0.0">
        </div>
        <div style="text-align: center; color: var(--accent); margin: -5px 0 5px 0; font-size: 18px;">⬇</div>
        <div class="input-group">
            <label><span>Ke: OPNT (Estimasi)</span> <span id="balOut">Saldo: 0.00</span></label>
            <input type="number" id="outputAmount" placeholder="0.0" readonly style="background: #090c10; color: var(--accent);">
        </div>
        <div id="statusLog">Koneksikan Wallet...</div>
        <button id="btnSwap" class="btn btn-primary" disabled>EXECUTE SWAP</button>
    </div>

    <div id="tab-liquidity" class="card" style="display: none;">
        <div class="input-group">
            <label>Token A (WOPN)</label>
            <input type="number" id="inputAmtA" placeholder="0.0">
        </div>
        <div class="input-group">
            <label>Token B (OPNT)</label>
            <input type="number" id="inputAmtB" placeholder="0.0">
        </div>
        <button id="btnLiquidity" class="btn btn-primary" disabled>ADD LIQUIDITY</button>
        
        <div style="margin-top: 20px; border-top: 1px solid var(--border); padding-top: 15px;">
            <label style="color: var(--danger); font-weight: bold;">REMOVE LIQUIDITY (%)</label>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="btn btn-outline" onclick="onRemoveLiq(1)" disabled>25%</button>
                <button class="btn btn-outline" onclick="onRemoveLiq(2)" disabled>50%</button>
                <button class="btn btn-outline" onclick="onRemoveLiq(3)" disabled>75%</button>
                <button class="btn btn-outline" onclick="onRemoveLiq(4)" disabled>100%</button>
            </div>
        </div>
    </div>

    <div class="history-box">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <label>LEDGER TRANSACTION HISTORY</label>
            <span onclick="clearHistory()" style="font-size: 10px; color: var(--danger); cursor: pointer; font-weight: bold;">[CLEAR]</span>
        </div>
        <div id="txList"></div>
    </div>

    <script src="app.js"></script>
    <script>
        let userAddress = "";
        let rpcProvider = new ethers.JsonRpcProvider("https://testnet-rpc2.iopn.tech");
        let debounceTimer;

        // --- UI TAB SYSTEM ---
        function switchTab(tab) {
            document.getElementById('tabSwapBtn').classList.toggle('active', tab === 'swap');
            document.getElementById('tabLiqBtn').classList.toggle('active', tab === 'liquidity');
            document.getElementById('tab-swap').style.display = tab === 'swap' ? 'block' : 'none';
            document.getElementById('tab-liquidity').style.display = tab === 'liquidity' ? 'block' : 'none';
        }

        // --- BALANCE & PRICE DISCOVERY ---
        async function updateBalances() {
            if (!userAddress) return;
            try {
                const abi = ["function balanceOf(address) view returns (uint256)"];
                const cIn = new ethers.Contract(CONFIG.T_IN, abi, rpcProvider);
                const cOut = new ethers.Contract(CONFIG.T_OUT, abi, rpcProvider);
                const [bIn, bOut] = await Promise.all([cIn.balanceOf(userAddress), cOut.balanceOf(userAddress)]);
                document.getElementById("balIn").innerText = "Saldo: " + ethers.formatUnits(bIn, 18);
                document.getElementById("balOut").innerText = "Saldo: " + ethers.formatUnits(bOut, 18);
            } catch (e) { console.error("Balance Error", e); }
        }

        // --- AUTO ESTIMATOR (Mencegah Swap Error) ---
        document.getElementById("inputAmount").oninput = (e) => {
            clearTimeout(debounceTimer);
            const val = e.target.value;
            if (!val || val <= 0) { document.getElementById("outputAmount").value = ""; return; }

            debounceTimer = setTimeout(async () => {
                try {
                    // Logika Estimasi Sederhana atau panggil getPool
                    // Disini kita asumsikan rasio 1:1 untuk testnet, sesuaikan jika pool ada fee
                    const estimasi = parseFloat(val) * 0.99; // 1% fee buffer
                    document.getElementById("outputAmount").value = estimasi.toFixed(6);
                    document.getElementById("statusLog").innerText = "Price Updated ✅";
                } catch (err) { 
                    document.getElementById("outputAmount").value = "Error";
                }
            }, 500);
        };

        // --- WALLET CONNECT ---
        async function connect() {
            if (!window.ethereum) return alert("Buka di Rabby/Metamask bray!");
            try {
                const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
                userAddress = accounts[0];
                document.getElementById("btnConnect").innerText = userAddress.slice(0, 6) + "..." + userAddress.slice(-4);
                document.querySelectorAll('button').forEach(b => b.disabled = false);
                document.getElementById("statusLog").innerText = "Sentinel Ready 🛡️";
                updateBalances();
            } catch (err) { 
                document.getElementById("statusLog").innerText = "Gagal Konek!";
            }
        }

        // --- KERNEL BRIDGES ---
        function setKernelStatus(isLive) {
            const el = document.getElementById("kernel-status");
            el.innerText = isLive ? "SENTINEL LIVE" : "SENTINEL IDLE";
            el.className = isLive ? "status-pill status-online" : "status-pill";
        }

        async function onSwapClick() {
            const val = document.getElementById("inputAmount").value;
            const outVal = document.getElementById("outputAmount").value;
            if (!val || !outVal || outVal === "Error") return;

            setKernelStatus(true);
            await window.executeKernelAction("SWAP", { 
                amtIn: ethers.parseUnits(val, 18), 
                minOut: ethers.parseUnits(outVal, 18) * 95n / 100n // Slippage 5%
            });
            setKernelStatus(false);
            updateBalances();
        }

        async function onAddLiquidityClick() {
            const a = document.getElementById("inputAmtA").value;
            const b = document.getElementById("inputAmtB").value;
            if(!a || !b) return;

            setKernelStatus(true);
            await window.executeKernelAction("ADD_LIQUIDITY", { 
                amtA: ethers.parseUnits(a, 18), 
                amtB: ethers.parseUnits(b, 18) 
            });
            setKernelStatus(false);
            updateBalances();
        }

        async function onRemoveLiq(percent) {
            setKernelStatus(true);
            await window.executeKernelAction("REMOVE_LIQUIDITY", { percent });
            setKernelStatus(false);
            updateBalances();
        }

        function clearHistory() {
            if(confirm("Hapus Ledger?")) {
                localStorage.removeItem("bozz_history");
                window.renderHistory();
            }
        }

        // Inisialisasi
        document.getElementById("btnConnect").onclick = connect;
        document.getElementById("btnSwap").onclick = onSwapClick;
        document.getElementById("btnLiquidity").onclick = onAddLiquidityClick;
        
        // Render history saat load
        window.addEventListener('load', () => {
            if (window.renderHistory) window.renderHistory();
        });
    </script>
</body>
</html>
