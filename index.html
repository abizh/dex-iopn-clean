<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOZZDEX V2.1</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>

<style>
body {
    background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
    color: white;
}
.gold-glow {
    box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
    border: 1px solid #d4af37;
}
.btn-gold {
    background: linear-gradient(135deg, #d4af37 0%, #f9e076 100%);
}
.btn-connect {
    background-color: #8b0000;
}
.wallet-active {
    background-color: #4b3d00;
}
input {
    background: rgba(255,255,255,0.05);
}
</style>
</head>

<body>

<nav class="flex justify-between p-6">
    <h1 class="text-xl font-bold">BOZZDEX</h1>
    <button id="connectBtn" class="btn-connect px-4 py-2 rounded">
        CONNECT
    </button>
</nav>

<div class="max-w-md mx-auto mt-10 p-6 gold-glow rounded">

    <input id="amtIn" type="number" placeholder="Amount In" class="w-full p-3 mb-4">

    <input id="amtOut" type="number" placeholder="Estimated Out" class="w-full p-3 mb-4" readonly>

    <button id="swapBtn" class="btn-gold w-full py-3 rounded">
        ENTER AMOUNT
    </button>

    <p id="status" class="mt-4 text-sm text-gray-400"></p>

</div>

<script src="app.js"></script>

</body>
</html>
