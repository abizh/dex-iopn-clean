<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEX ROUTE OPTIMIZER - PHASE 1</title>
  <style>
    body { background:#0b0f14; color:white; font-family:sans-serif; padding:20px; line-height:1.6; }
    h2 { color:#00d4ff; border-bottom: 1px solid #333; padding-bottom:10px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
    button { padding:12px 20px; cursor:pointer; border:none; border-radius:10px; font-weight:bold; transition: 0.3s; margin-bottom: 10px; }
    .btn-connect { background:#ffffff; color:#000; width: 100%; max-width:250px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .card { background: #161b22; border: 1px solid #30363d; padding: 15px; border-radius: 12px; text-align: center; border-left: 3px solid #3b82f6; }
    .card small { font-size: 10px; color: #555; display: block; margin-bottom: 5px; font-weight: bold; }
    .card .val { font-size: 16px; font-weight: bold; color: #00ff00; margin-bottom: 2px; }
    .card .sym { font-size: 11px; color: #00d4ff; font-weight: bold; }
    .status-box { background:#161b22; border:1px solid #30363d; padding:15px; border-radius:8px; margin-top:10px; }
    input { background:#1a1f26; border:1px solid #444; color:white; padding:10px; border-radius:5px; width:100px; }
  </style>
</head>
<body>

  <h2>DEX OPTIMIZER (PHASE 1)</h2>

  <button id="btnConnect" class="btn-connect" onclick="connectWallet()">CONNECT WALLET</button>
  <div id="wallet" style="color:#888; font-family:monospace; margin-bottom:20px; font-size:12px;">Status: Disconnected</div>

  <div id="balance-grid" class="grid">
    </div>

  <div class="status-box">
    <label>Amount In:</label> 
    <input id="amountIn" type="number" value="10" />
    <div style="display:flex; gap:10px; margin-top:15px;">
      <button style="background:#28a745; color:white; flex:1;" onclick="simulateExecution()">SIMULATE</button>
      <button style="background:#007bff; color:white; flex:1;" onclick="executeSwap()">EXECUTE</button>
    </div>
  </div>

  <div class="status-box">
    <strong>Output Log:</strong>
    <div id="output" style="font-family:monospace; font-size:11px; color:#abb2bf; margin-top:5px;">System: Ready for Phase 2.</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <script src="app.js"></script>
  
  <script>
    async function connectWallet() {
      if (typeof window.ethereum !== 'undefined') {
        try {
          const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
          window.userAddress = accounts[0];
          window.provider = new ethers.providers.Web3Provider(window.ethereum);
          
          document.getElementById('wallet').innerText = "Linked: " + window.userAddress;
          document.getElementById('btnConnect').innerText = "WALLET SYNCED ✅";
          document.getElementById('btnConnect').style.background = "#28a745";
          document.getElementById('btnConnect').style.color = "#fff";

          if (typeof fetchBalances === "function") fetchBalances();
        } catch (err) {
          document.getElementById('output').innerText = "Err: " + err.message;
        }
      } else { alert("Please use MetaMask/Mises Browser!"); }
    }
  </script>
</body>
</html>
