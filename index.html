<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOZZDEX V2.1</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>

<style>
body {
    background: #0f0f0f;
    color: white;
}
</style>
</head>

<body class="flex flex-col items-center mt-10">

<h1 class="text-2xl mb-4">🔥 BOZZDEX</h1>

<button id="btnConnect" class="bg-red-700 px-4 py-2 rounded">
CONNECT WALLET
</button>

<p id="networkBadge" class="mt-2 text-sm text-gray-400">Offline</p>

<div class="mt-6 bg-gray-900 p-4 rounded w-80">

<input id="inputAmount" type="number" placeholder="Amount In"
class="w-full p-2 mb-3 bg-black border border-gray-700">

<input id="outputAmount" type="number" placeholder="Estimated Out"
class="w-full p-2 mb-3 bg-black border border-gray-700" readonly>

<p id="balIn" class="text-xs text-gray-400">Saldo: -</p>
<p id="balOut" class="text-xs text-gray-400 mb-3">Saldo: -</p>

<button id="btnSwap" disabled
class="bg-yellow-500 w-full py-2 rounded text-black font-bold">
SWAP
</button>

</div>

<p id="statusLog" class="mt-4 text-sm text-gray-400">Ready...</p>

<script src="app.js"></script>

</body>
</html>
