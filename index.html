<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOLD OPTIMIZER V1.3.0 - PRIVATE POOL</title>
  <style>
    :root {
      --gold-grad: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
      --dark-bg: #05070a;
      --card-bg: #10141b;
    }
    body { background: var(--dark-bg); color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }
    .header { width: 100%; max-width: 450px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    h2 { font-size: 16px; letter-spacing: 2px; background: var(--gold-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; font-weight: 900; text-transform: uppercase; }
    .btn-connect { background: var(--gold-grad); color: #000; padding: 10px 18px; cursor: pointer; border: none; border-radius: 25px; font-weight: bold; font-size: 11px; box-shadow: 0 0 15px rgba(191, 149, 63, 0.2); transition: 0.3s; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; width: 100%; max-width: 450px; margin-bottom: 25px; }
    .card { background: var(--card-bg); border: 1px solid #2a2110; padding: 15px; border-radius: 16px; border-left: 4px solid #bf953f; min-width: 100px; }
    .card small { font-size: 9px; color: #888; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 4px; }
    .card .val { font-size: 16px; font-weight: bold; color: #fcf6ba; font-family: monospace; }
    .swap-container { background: var(--card-bg); border: 1px solid #2a2110; padding: 25px; border-radius: 30px; width: 100%; max-width: 400px; box-shadow: 0 15px 50px rgba(0,0,0,0.8); }
    .input-group { background: #000; padding: 18px; border-radius: 20px; border: 1px solid #1c1c1c; margin-bottom: 5px; }
    .input-group label { font-size: 10px; color: #555; display: block; margin-bottom: 8px; font-weight: bold; text-transform: uppercase; }
    .input-row { display: flex; justify-content: space-between; align-items: center; }
    input { background: transparent; border: none; color: white; font-size: 22px; font-weight: bold; width: 55%; outline: none; font-family: monospace; }
    select { background: #111; color: #fcf6ba; border: 1px solid #bf953f; padding: 6px 12px; border-radius: 10px; font-size: 12px; font-weight: bold; cursor: pointer; outline: none; }
    .divider { text-align: center; margin: -15px 0; position: relative; z-index: 10; }
    .arrow-down { background: #000; border: 1px solid #bf953f; color: #bf953f; width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 14px; box-shadow: 0 0 15px rgba(191,149,63,0.4); }
    .btn-swap { width: 100%; padding: 18px; margin-top: 20px; background: var(--gold-grad); border: none; border-radius: 20px; color: #000; font-weight: bold; font-size: 15px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
    .btn-swap:disabled { opacity: 0.3; cursor: not-allowed; }
    .output-log { margin-top: 25px; background: #000; border: 1px solid #222; padding: 15px; border-radius: 12px; font-family: 'Courier New', monospace; font-size: 11px; color: #bf953f; width: 100%; max-width: 420px; line-height: 1.6; border-bottom: 3px solid #bf953f; min-height: 60px; word-break: break-all; }
  </style>
</head>
<body>

  <div class="header">
    <h2>Gold Optimizer</h2>
    <button id="btnConnect" class="btn-connect" onclick="handleAuth()">CONNECT WALLET</button>
  </div>

  <div id="balance-grid" class="grid">
    </div>

  <div class="swap-container">
    <div class="input-group">
        <label>You Sell</label>
        <div class="input-row">
            <input id="amountIn" type="number" value="1.0" step="any">
            <select id="tokenIn">
                <option value="WOPN">WOPN</option>
                <option value="tUSDT">tUSDT</option>
                <option value="TETE">TETE</option>
            </select>
        </div>
    </div>
    <div class="divider"><div class="arrow-down">↓</div></div>
    <div class="input-group">
        <label>You Get (Est)</label>
        <div class="input-row">
            <input id="amountOut" type="text" placeholder="0.00" readonly>
            <select id="tokenOut">
                <option value="OPNT">OPNT</option>
                <option value="TETE">TETE</option>
                <option value="WOPN">WOPN</option>
            </select>
        </div>
    </div>
    <button id="btnSwap" class="btn-swap" onclick="executeSwap()" disabled>INITIATE SWAP</button>
  </div>

  <div id="output" class="output-log">> SYSTEM: Core Offline. Waiting for Handshake...</div>

  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <script src="app.js"></script>
  
  <script>
    /**
     * SINKRONISASI HANDSHAKE (V1.3.0)
     * Memastikan window.userAddress & window.provider sinkron ke app.js
     */
    async function handleAuth() {
        if (typeof window.ethereum === 'undefined') {
            return updateSystem("> ERROR: Mises Browser/MetaMask not detected.");
        }

        try {
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            if (accounts.length > 0) {
                // 1. Set Global Variables
                window.userAddress = accounts[0];
                window.provider = new ethers.providers.Web3Provider(window.ethereum);
                
                // 2. UI Updates
                document.getElementById('btnConnect').innerText = 
                    window.userAddress.substring(0,6) + "..." + window.userAddress.substring(38);
                document.getElementById('btnSwap').disabled = false;
                
                // 3. Trigger Engine di app.js
                if (typeof window.initEngine === "function") {
                    window.initEngine();
                } else {
                    console.error("SOP Error: initEngine not found in app.js");
                }
            }
        } catch (err) {
            console.error("Auth Failed", err);
            document.getElementById('output').innerText = "> AUTH FAILED: " + err.message;
        }
    }

    // SOP: Auto-Sync jika wallet sudah terkoneksi sebelumnya
    window.addEventListener('load', async () => {
        if (window.ethereum) {
            const accounts = await window.ethereum.request({ method: 'eth_accounts' });
            if (accounts.length > 0) handleAuth();
        }
    });

    // Helper untuk update log jika app.js belum siap
    function updateSystem(msg) {
        document.getElementById("output").innerHTML = msg;
    }
  </script>
</body>
</html>
