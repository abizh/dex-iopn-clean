<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOZZDEX V3.5 FINAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.12.1/ethers.umd.min.js"></script>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9; --accent: #238636; --blue: #58a6ff; --red: #da3633; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .dex-card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 16px; width: 90%; max-width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        
        /* Tab Utama Navigation */
        .tabs { display: flex; gap: 15px; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .tab-btn { background: none; border: none; color: #8b949e; cursor: pointer; font-weight: bold; font-size: 16px; padding: 5px 10px; transition: 0.3s; }
        .tab-btn.active { color: var(--blue); border-bottom: 2px solid var(--blue); }

        /* Sub-Tab Liquidity (Add / Remove) */
        .sub-tabs { display: flex; background: var(--bg); border-radius: 8px; padding: 4px; margin: 10px 0 15px 0; border: 1px solid var(--border); }
        .sub-tab-btn { flex: 1; background: none; border: none; color: #8b949e; padding: 8px; cursor: pointer; font-size: 13px; border-radius: 6px; font-weight: bold; transition: 0.2s; }
        .sub-tab-btn.active { background: var(--border); color: #fff; }

        .input-box { background: var(--bg); padding: 12px; border-radius: 12px; border: 1px solid var(--border); margin: 8px 0; }
        .input-box input { background: transparent; border: none; color: #fff; font-size: 18px; width: 100%; outline: none; }
        
        .btn-connect { width: 100%; padding: 10px; border-radius: 10px; background: #21262d; color: #fff; border: 1px solid var(--border); cursor: pointer; margin-bottom: 15px; font-size: 12px; }
        .btn-action { width: 100%; padding: 14px; border-radius: 10px; background: var(--accent); color: #fff; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-action:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
        
        .label-row { display: flex; justify-content: space-between; font-size: 11px; color: #8b949e; margin-bottom: 4px; }
        .grid-percent { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 10px; }
        .btn-opt { background: #21262d; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 12px; }
        .btn-opt:hover { background: var(--border); }
        
        #statusLog { font-size: 10px; margin-top: 15px; color: #7ee787; min-height: 12px; text-align: center; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="dex-card">
        <button id="btnConnect" class="btn-connect">Hubungkan Dompet</button>
        
        <div class="tabs">
            <button id="tabSwap" class="tab-btn active" onclick="switchMainTab('swap')">Swap</button>
            <button id="tabLiq" class="tab-btn" onclick="switchMainTab('liquidity')">Liquidity</button>
        </div>

        <div id="swap-section">
            <div class="input-box">
                <div class="label-row"><span>JUAL (WOPN)</span><span id="balIn">Saldo: 0.0</span></div>
                <input type="text" id="inputAmount" inputmode="decimal" placeholder="0.0">
            </div>
            <div style="text-align:center; color:var(--blue); margin: -5px 0; font-weight: bold;">↓</div>
            <div class="input-box">
                <div class="label-row"><span>TERIMA (OPNT)</span><span id="balOut">Saldo: 0.0</span></div>
                <input type="text" id="outputAmount" placeholder="0.0" readonly>
            </div>
            <button id="btnSwap" class="btn-action" disabled>SWAP SEKARANG</button>
        </div>

        <div id="liq-section" class="hidden">
            <div class="sub-tabs">
                <button id="subTabAdd" class="sub-tab-btn active" onclick="switchSubTab('add')">Add</button>
                <button id="subTabRemove" class="sub-tab-btn" onclick="switchSubTab('remove')">Remove</button>
            </div>

            <div id="add-liq-content">
                <div class="input-box">
                    <div class="label-row"><span>WOPN Amount</span></div>
                    <input type="text" id="inputAmtA" inputmode="decimal" placeholder="0.0">
                </div>
                <div class="input-box">
                    <div class="label-row"><span>OPNT Amount</span></div>
                    <input type="text" id="inputAmtB" inputmode="decimal" placeholder="0.0">
                </div>
                <button id="btnLiquidity" class="btn-action" disabled>TAMBAH LIKUIDITAS</button>
            </div>

            <div id="remove-liq-content" class="hidden">
                <div class="label-row"><span>Jumlah Penarikan (%)</span></div>
                <div class="grid-percent">
                    <button class="btn-opt" onclick="executeRemoveLiquidity(1)">25%</button>
                    <button class="btn-opt" onclick="executeRemoveLiquidity(2)">50%</button>
                    <button class="btn-opt" onclick="executeRemoveLiquidity(3)">75%</button>
                    <button class="btn-opt" onclick="executeRemoveLiquidity(4)">100%</button>
                </div>
                <p style="font-size: 10px; color: #8b949e; text-align: center; margin-top: 20px; line-height: 1.4;">
                    Menarik likuiditas akan mengembalikan token WOPN dan OPNT ke dompet Anda berdasarkan share pool.
                </p>
            </div>
        </div>

        <div id="marketPrice" style="font-size:12px; color:var(--blue); margin-top:15px; border-top: 1px solid var(--border); padding-top: 10px;"></div>
        <div id="statusLog"></div>
    </div>

    <script>
        // Navigasi Tab Utama
        function switchMainTab(tab) {
            const swapSec = document.getElementById('swap-section');
            const liqSec = document.getElementById('liq-section');
            const tabSwap = document.getElementById('tabSwap');
            const tabLiq = document.getElementById('tabLiq');

            if (tab === 'swap') {
                swapSec.classList.remove('hidden');
                liqSec.classList.add('hidden');
                tabSwap.classList.add('active');
                tabLiq.classList.remove('active');
            } else {
                swapSec.classList.add('hidden');
                liqSec.classList.remove('hidden');
                tabSwap.classList.remove('active');
                tabLiq.classList.add('active');
            }
        }

        // Navigasi Sub-Tab (Khusus di dalam Liquidity)
        function switchSubTab(sub) {
            const addContent = document.getElementById('add-liq-content');
            const removeContent = document.getElementById('remove-liq-content');
            const subTabAdd = document.getElementById('subTabAdd');
            const subTabRemove = document.getElementById('subTabRemove');

            if (sub === 'add') {
                addContent.classList.remove('hidden');
                removeContent.classList.add('hidden');
                subTabAdd.classList.add('active');
                subTabRemove.classList.remove('active');
            } else {
                addContent.classList.add('hidden');
                removeContent.classList.remove('hidden');
                subTabAdd.classList.remove('active');
                subTabRemove.classList.add('active');
            }
        }
    </script>
    <script src="app.js"></script>
</body>
                </html>
