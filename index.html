<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGN KERNEL v71.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --border: #262626;
            --primary: #00ff88;
            --text: #e5e5e5;
            --dim: #737373;
            --error: #ff4444;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface);
        }

        .status-pill {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            border: 1px solid var(--border);
        }

        .online { color: var(--primary); border-color: var(--primary); }
        .offline { color: var(--error); border-color: var(--error); }

        main {
            display: grid;
            grid-template-columns: 350px 1fr;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            padding: 2rem;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .card {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .balance-label { font-size: 12px; color: var(--dim); margin-bottom: 4px; }
        .balance-value { font-size: 24px; font-weight: 600; margin-bottom: 1rem; }

        input {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid var(--border);
            color: #fff;
            border-radius: 4px;
            margin-bottom: 1rem;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:disabled { opacity: 0.3; cursor: not-allowed; }

        .monitor {
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .tx-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid var(--border);
            font-family: 'Cascadia Code', monospace;
            font-size: 13px;
        }

        .hash-link { color: var(--primary); text-decoration: none; font-size: 11px; }
        .tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #333; }

        .signing-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>

    <div id="signingOverlay" class="signing-overlay">
        <div class="card" style="text-align: center;">
            <div style="margin-bottom: 1rem; color: var(--primary);">⚡ KERNEL AWAITING SIGNATURE</div>
            <div style="font-size: 12px; color: var(--dim);">Silakan cek MetaMask / Wallet kamu...</div>
        </div>
    </div>

    <header>
        <div><span style="font-weight: bold; letter-spacing: 2px;">SOVEREIGN // v71.0</span></div>
        <div id="networkStatus" class="status-pill offline">Disconnected</div>
    </header>

    <main>
        <section class="sidebar">
            <div class="card">
                <div class="balance-label">WALLET ADDRESS</div>
                <div id="addrDisplay" style="font-size: 11px; color: var(--primary); word-break: break-all;">Not Connected</div>
            </div>

            <div class="card">
                <div class="balance-label">ETH BALANCE</div>
                <div id="ethBalance" class="balance-value">0.00</div>
                <div class="balance-label">WOPN BALANCE</div>
                <div id="wopnBalance" class="balance-value">0.00</div>
            </div>

            <div class="card">
                <input type="number" id="txAmount" placeholder="0.00" step="0.01">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <button id="btnDeposit" onclick="handleTx('DEPOSIT')">DEPOSIT</button>
                    <button id="btnWithdraw" onclick="handleTx('WITHDRAW')" style="background: transparent; color: var(--primary); border: 1px solid var(--primary);">WITHDRAW</button>
                </div>
            </div>
        </section>

        <section class="monitor">
            <div style="font-size: 14px; font-weight: bold; border-left: 3px solid var(--primary); padding-left: 10px;">
                KERNEL TRANSACTION JOURNAL
            </div>
            <div id="txJournal" class="card" style="min-height: 300px; padding: 0;"></div>
        </section>
    </main>

    <script>
        /**
         * Bagian 1: UI SYNC ADAPTER
         * Fungsi ini WAJIB ada di scope window agar bisa dipanggil oleh Kernel.
         */
        window.syncSovereignUI = (state) => {
            const { vault, kernel, network } = state;

            // Update Status Jaringan
            const netPill = document.getElementById('networkStatus');
            netPill.innerText = network.rpcStatus === 'OK' ? `CHAIN ${network.chainId}` : network.rpcStatus;
            netPill.className = `status-pill ${network.connected ? 'online' : 'offline'}`;

            // Update Saldo & Alamat
            document.getElementById('addrDisplay').innerText = vault.address || "Not Connected";
            document.getElementById('ethBalance').innerText = parseFloat(vault.balanceIn).toFixed(4);
            document.getElementById('wopnBalance').innerText = parseFloat(vault.balanceOut).toFixed(4);

            // Update Status Tombol & Overlay
            const isBusy = kernel.status !== 'IDLE';
            document.getElementById('btnDeposit').disabled = isBusy;
            document.getElementById('btnWithdraw').disabled = isBusy;
            document.getElementById('txAmount').disabled = isBusy;
            document.getElementById('signingOverlay').style.display = kernel.status === 'SIGNING' ? 'flex' : 'none';

            // Render Journal (History)
            const journal = document.getElementById('txJournal');
            journal.innerHTML = kernel.txQueue.length ? '' : '<div style="padding: 2rem; color: #444; text-align: center;">No transaction history.</div>';
            
            kernel.txQueue.forEach(tx => {
                const item = document.createElement('div');
                item.className = 'tx-item';
                const statusColor = tx.status === 'SUCCESS' ? 'var(--primary)' : (tx.status === 'FAILED' ? 'var(--error)' : '#ffaa00');
                
                item.innerHTML = `
                    <div>
                        <span class="tag">${tx.type}</span>
                        <span style="color: ${statusColor}; margin-left: 8px;">● ${tx.status}</span>
                        <br/>
                        ${tx.hash ? `<a href="https://testnet.iopn.tech/tx/${tx.hash}" target="_blank" class="hash-link">${tx.hash.substring(0, 16)}...</a>` : `<span style="font-size: 10px; color: var(--dim);">${tx.error || 'No hash'}</span>`}
                    </div>
                    <div style="color: var(--dim); font-size: 10px;">${new Date(tx.ts).toLocaleTimeString()}</div>
                `;
                journal.appendChild(item);
            });
        };

        /**
         * Bagian 2: ACTION HANDLER
         */
        function handleTx(mode) {
            if(!window.KernelDispatcher) return alert("Kernel not loaded!");
            const amount = document.getElementById('txAmount').value;
            window.KernelDispatcher.execute('WOPN_ACTION', { mode, amount });
        }

        /**
         * Bagian 3: SOVEREIGN ENGINE v71.0 (THE KERNEL)
         */
        const SovereignEngine = (() => {
            const _CONFIG = Object.freeze({
                CHAIN_ID: 2047,
                RPC: "https://testnet-rpc2.iopn.tech",
                WOPN: "0x826496be2340356C193566190802777174e929f9",
                GHOST_TTL: 600000,
                TX_TIMEOUT: 90000,
                HEARTBEAT_INTERVAL: 8000,
                PERSISTENCE_MAX_AGE: 86400000
            });

            const _INTERNAL = {
                state: {
                    vault: { address: null, balanceIn: "0", balanceOut: "0" },
                    kernel: { status: "IDLE", txQueue: [] },
                    network: { chainId: null, connected: false, rpcStatus: "OK" }
                },
                settlements: new Map(),
                ghosts: new Map(),
                provider: null,
                staticProvider: new ethers.JsonRpcProvider(_CONFIG.RPC),
                abortController: new AbortController(),
                lock: false,
                inflightHydration: false,
                hydrationScheduled: false,
                epoch: 0,
                syncScheduled: false,
                heartbeatId: null,
                handlers: { accounts: null, chain: null }
            };

            const _core = {
                async getProvider() {
                    if (!_INTERNAL.provider && window.ethereum) {
                        _INTERNAL.provider = new ethers.BrowserProvider(window.ethereum);
                    }
                    return _INTERNAL.provider;
                },
                mutate(updates) {
                    let changed = false;
                    updates.forEach(([path, value]) => {
                        const keys = path.split('.');
                        let target = _INTERNAL.state;
                        for (let i = 0; i < keys.length - 1; i++) target = target[keys[i]];
                        const lastKey = keys[keys.length - 1];
                        if (target[lastKey] !== value) { target[lastKey] = value; changed = true; }
                    });
                    if (changed) { this.triggerSync(); this.persist(); }
                },
                triggerSync() {
                    if (_INTERNAL.syncScheduled || !window.syncSovereignUI) return;
                    _INTERNAL.syncScheduled = true;
                    queueMicrotask(() => {
                        try { window.syncSovereignUI(JSON.parse(JSON.stringify(_INTERNAL.state))); }
                        finally { _INTERNAL.syncScheduled = false; }
                    });
                },
                persist() {
                    try {
                        const now = Date.now();
                        const settlements = [..._INTERNAL.settlements.entries()]
                            .filter(([_, v]) => now - v.ts < _CONFIG.PERSISTENCE_MAX_AGE).slice(-50);
                        localStorage.setItem('SOVEREIGN_JOURNAL', JSON.stringify({ queue: _INTERNAL.state.kernel.txQueue, settlements }));
                    } catch {}
                },
                loadPersistence() {
                    try {
                        const raw = localStorage.getItem('SOVEREIGN_JOURNAL');
                        if (!raw) return;
                        const parsed = JSON.parse(raw);
                        _INTERNAL.settlements = new Map(parsed.settlements || []);
                        this.mutate([['kernel.txQueue', parsed.queue || []]]);
                    } catch {}
                }
            };

            return {
                async execute(type, payload) {
                    if (_INTERNAL.lock || _INTERNAL.state.kernel.status !== "IDLE") return;
                    const amount = payload?.amount?.toString() || "0";
                    if (isNaN(amount) || parseFloat(amount) <= 0) return;
                    _INTERNAL.lock = true;
                    let timeoutId = null;

                    try {
                        const provider = await _core.getProvider();
                        const network = await provider.getNetwork();
                        if (Number(network.chainId) !== _CONFIG.CHAIN_ID) throw new Error("WRONG_NETWORK");

                        const accounts = await provider.send("eth_accounts", []);
                        if (!accounts?.length) throw new Error("WALLET_DISCONNECTED");

                        const signer = await provider.getSigner();
                        _core.mutate([['kernel.status', 'SIGNING']]);

                        const contract = new ethers.Contract(_CONFIG.WOPN, ["function deposit() payable", "function withdraw(uint256)"], signer);
                        const tx = payload.mode === 'DEPOSIT' 
                            ? await contract.deposit({ value: ethers.parseUnits(amount, 18) }) 
                            : await contract.withdraw(ethers.parseUnits(amount, 18));

                        _core.mutate([['kernel.status', 'OBSERVING']]);
                        _INTERNAL.ghosts.set(tx.hash, { ts: Date.now(), type });

                        const receipt = await Promise.race([
                            tx.wait(1),
                            new Promise((_, reject) => {
                                timeoutId = setTimeout(() => reject(new Error("TIMEOUT")), _CONFIG.TX_TIMEOUT);
                                _INTERNAL.abortController.signal.addEventListener('abort', () => reject(new Error("ABORTED")), { once: true });
                            })
                        ]);
                        if (receipt) this.finalize(receipt.hash, type, "SUCCESS");
                    } catch (err) {
                        if (err.message !== "ABORTED") this.finalize(null, type, "FAILED", err.reason || err.message);
                    } finally {
                        if (timeoutId) clearTimeout(timeoutId);
                        _INTERNAL.lock = false;
                        _core.mutate([['kernel.status', 'IDLE']]);
                    }
                },
                finalize(hash, type, status, error = null) {
                    const now = Date.now();
                    if (hash) {
                        if (_INTERNAL.settlements.get(hash)?.status === "SUCCESS") return;
                        _INTERNAL.settlements.set(hash, { status, ts: now });
                    }
                    _INTERNAL.ghosts.delete(hash);
                    const entry = { hash, type, status, error, ts: now };
                    const queue = [entry, ..._INTERNAL.state.kernel.txQueue].filter((v,i,a) => !v.hash || a.findIndex(t => t.hash === v.hash) === i).slice(0, 10);
                    _core.mutate([['
