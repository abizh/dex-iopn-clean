<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOZZDEX V2.1 | Pro Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0e1117; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .dex-card { background: #161b22; padding: 2rem; border-radius: 20px; border: 1px solid #30363d; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .status-badge { font-size: 0.8rem; padding: 4px 10px; border-radius: 12px; background: #238636; color: white; margin-bottom: 1rem; display: inline-block; }
        .input-group { background: #0d1117; padding: 15px; border-radius: 12px; margin-bottom: 1rem; border: 1px solid #30363d; }
        label { color: #8b949e; font-size: 0.9rem; }
        input { background: transparent; border: none; color: #fff; font-size: 1.5rem; width: 100%; outline: none; margin-top: 5px; }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        #btnConnect { background: #21262d; color: #c9d1d9; }
        #btnSwap { background: #238636; color: white; font-size: 1.1rem; }
        #btnSwap:disabled { background: #161b22; color: #484f58; cursor: not-allowed; }
        .pool-data { margin-top: 1.5rem; font-size: 0.75rem; color: #8b949e; border-top: 1px solid #30363d; pt: 1rem; }
        .log-area { font-family: monospace; font-size: 0.7rem; color: #58a6ff; margin-top: 10px; height: 40px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="dex-card">
    <div id="networkStatus" class="status-badge">Menunggu Koneksi...</div>
    <button id="btnConnect" onclick="connectWallet()">Hubungkan Dompet</button>

    <div class="input-group">
        <label>Anda Jual (Token A)</label>
        <input type="number" id="inputAmount" placeholder="0.0" oninput="calculateEstimate()">
        <small id="balanceIn">Saldo: 0.0</small>
    </div>

    <div style="text-align: center; margin: -10px 0 10px;">↓</div>

    <div class="input-group">
        <label>Anda Beli (Token B)</label>
        <input type="number" id="outputAmount" placeholder="0.0" disabled>
        <small id="balanceOut">Saldo: 0.0</small>
    </div>

    <button id="btnSwap" onclick="executeSwap()" disabled>MULAI PERDAGANGAN</button>

    <div class="pool-data">
        <div>Router: <span id="routerAddr">0x98cb...1961</span></div>
        <div>Pool: <span id="poolAddr">0x650d...693a8</span></div>
        <div class="log-area" id="logConsole">System Ready...</div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
