<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOLD OPTIMIZER — AMM LIVE</title>

<style>
body {
  background:#05070a;
  color:#fff;
  font-family:sans-serif;
  text-align:center;
  padding:20px;
}
.box {
  max-width:420px;
  margin:auto;
}
input,select,button {
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:none;
}
button {
  background:gold;
  font-weight:bold;
}
.log {
  background:#000;
  padding:10px;
  margin-top:10px;
  font-size:12px;
  color:gold;
}
</style>
</head>

<body>

<div class="box">

<h2>🚀 GOLD AMM</h2>

<button onclick="connectWallet()">CONNECT</button>

<input id="amountIn" type="number" value="1">

<select id="tokenIn">
  <option value="WOPN">WOPN</option>
  <option value="OPNT">OPNT</option>
</select>

<select id="tokenOut">
  <option value="OPNT">OPNT</option>
  <option value="WOPN">WOPN</option>
</select>

<input id="amountOut" readonly>

<button onclick="executeSwap()">SWAP</button>

<div id="output" class="log"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

<script src="app.js"></script>

<script>
async function connectWallet(){
  if(!window.ethereum) return alert("Install wallet");

  const acc = await ethereum.request({method:"eth_requestAccounts"});

  window.provider = new ethers.providers.Web3Provider(window.ethereum);
  window.userAddress = acc[0];

  initEngine();
}
</script>

</body>
</html>
