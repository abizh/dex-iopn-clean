<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sovereign Sentinel v46.0 | Dashboard</title>
    
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>

    <style>
        :root {
            --bg: #0a0a0c;
            --surface: #16161a;
            --primary: #00ff88;
            --warning: #ffcc00;
            --danger: #ff4444;
            --text: #e0e0e0;
            --border: #333;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 15px;
            font-size: 14px;
        }

        /* --- STATUS CARD --- */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .kernel-title {
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--primary);
        }

        .badge {
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .badge-idle { background: #333; color: #aaa; }
        .badge-live { background: var(--primary); color: #000; box-shadow: 0 0 10px var(--primary); }

        /* --- METADATA GRID --- */
        .meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .meta-item {
            background: rgba(255,255,255,0.03);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .meta-label {
            font-size: 10px;
            color: #777;
            display: block;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .meta-value {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            word-break: break-all;
            color: #fff;
        }

        /* --- ACTION BUTTON --- */
        .btn-execute {
            width: 100%;
            background: var(--primary);
            color: #000;
            border: none;
            padding: 18px;
            border-radius: 8px;
            font-weight: 900;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .btn-execute:active { transform: scale(0.96); opacity: 0.8; }
        .btn-execute:disabled {
            background: #222;
            color: #555;
            cursor: not-allowed;
            transform: none;
        }

        /* --- FORENSIC TERMINAL --- */
        .terminal-label {
            font-size: 11px;
            color: #555;
            margin-bottom: 8px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        #terminal {
            background: #000;
            border: 1px solid var(--border);
            border-radius: 8px;
            height: 250px;
            overflow-y: auto;
            padding: 12px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 11px;
            color: #00ff66;
            line-height: 1.4;
        }

        .log-line { margin-bottom: 6px; border-bottom: 1px solid #111; padding-bottom: 2px; }
        .log-ts { color: #444; margin-right: 5px; }
        .log-type-INTENT { color: var(--warning); }
        .log-type-HASH { color: #00ccff; }
        .log-type-FINALIZED { color: var(--primary); font-weight: bold; }
        .log-type-FAULT { color: var(--danger); }
        .log-type-TERMINATED { color: #ff00ff; }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <div class="kernel-title">SENTINEL KERNEL v46.0</div>
            <div id="status-badge" class="badge badge-idle">System Idle</div>
        </div>

        <div class="meta-grid">
            <div class="meta-item">
                <span class="meta-label">Active Epoch</span>
                <span id="meta-epoch" class="meta-value">---</span>
            </div>
            <div class="meta-item">
                <span class="meta-label">Lease Sequence</span>
                <span id="meta-seq" class="meta-value">0</span>
            </div>
            <div class="meta-item">
                <span class="meta-label">Leadership Token</span>
                <span id="meta-token" class="meta-value">VACANT</span>
            </div>
            <div class="meta-item">
                <span class="meta-label">Session ID</span>
                <span id="meta-sid" class="meta-value">---</span>
            </div>
        </div>

        <button id="main-action" class="btn-execute" onclick="triggerExecution()">
            Execute Transaction
        </button>
    </div>

    <div class="terminal-label">
        <span>LIVE FORENSIC REPLAY ENGINE</span>
        <span id="page-count">PAGES: 0</span>
    </div>
    <div id="terminal">
        <div class="log-line"><span class="log-ts">[SYSTEM]</span> Kernel siap. Menunggu instruksi...</div>
    </div>

    <script src="app.js"></script>

    <script>
        // Inisialisasi UI Metadata
        document.getElementById('meta-sid').innerText = window.SESSION_ID || 'INIT';

        const terminal = document.getElementById('terminal');
        const btnAction = document.getElementById('main-action');
        const statusBadge = document.getElementById('status-badge');

        // Fungsi Helper untuk Update UI dari app.js
        function pushLog(msg, type = '') {
            const line = document.createElement('div');
            line.className = 'log-line';
            const ts = new Date().toLocaleTimeString();
            line.innerHTML = `<span class="log-ts">[${ts}]</span> <span class="log-type-${type}">${msg}</span>`;
            terminal.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
        }

        async function triggerExecution() {
            btnAction.disabled = true;
            statusBadge.innerText = "Kernel Live";
            statusBadge.className = "badge badge-live";
            
            try {
                // Eksekusi fungsi utama di app.js
                await window.executeRemoveLiquidity(0);
            } catch (e) {
                pushLog("UI_EXCEPTION: " + e.message, 'FAULT');
            } finally {
                btnAction.disabled = false;
                statusBadge.innerText = "System Idle";
                statusBadge.className = "badge badge-idle";
            }
        }

        // Monitoring Loop untuk visualisasi 'Ground Truth' di LocalStorage
        setInterval(() => {
            const lock = JSON.parse(localStorage.getItem('bozz_global_lock') || '{}');
            
            document.getElementById('meta-epoch').innerText = lock.epoch ? lock.epoch.split('_')[1] : '---';
            document.getElementById('meta-token').innerText = lock.token ? lock.token.substring(0, 12) + '...' : 'VACANT';
            document.getElementById('meta-seq').innerText = lock.seq || 0;

            if (lock.epoch) {
                const pages = localStorage.getItem(`bozz_ledger_${lock.epoch}_latest`) || 0;
                document.getElementById('page-count').innerText = `PAGES: ${pages}`;
            }

            // Jika status dirubah oleh app.js (Tombstone), sesuaikan warna UI
            if (lock.status === "RELEASED_BY_LEADER") {
                statusBadge.innerText = "Terminated";
                statusBadge.className = "badge badge-idle";
            }
        }, 1000);

        // Intercept console.log untuk dialirkan ke terminal visual (Opsional)
        const originalLog = console.log;
        console.log = function(...args) {
            if (args[0] && args[0].includes("[SENTINEL]")) {
                pushLog(args[0], args[0].includes("Success") ? "FINALIZED" : "");
            }
            originalLog.apply(console, args);
        };
    </script>
</body>
    </html>
